<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resilience Test Engineer — Interview Questionnaire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    /* ── TOKENS ─────────────────────────────────────────────────── */
    :root {
      --bg: #0b0d12;
      --bg2: #10131a;
      --bg3: #161b26;
      --bg4: #1d2333;
      --surface: #1a1f2e;
      --sur2: #212840;
      --border: #272e45;
      --bor2: #323d5c;
      --text: #e4e8f4;
      --text2: #8e97b8;
      --text3: #545d7e;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --violet: #8b5cf6;
      --vsof: rgba(139, 92, 246, .14);
      --gsof: rgba(34, 197, 94, .11);
      --tr: 0.25s ease;
      --sidebar: 256px;

      --c0: #22c55e;
      --c1: #3b82f6;
      --c2: #f59e0b;
      --c3: #ec4899;
      --c4: #8b5cf6;
      --c5: #06b6d4;
      --c6: #f97316;
      --c7: #a3e635;
      --c8: #e879f9;
    }

    [data-theme="light"] {
      --bg: #f1f3fa;
      --bg2: #e8eaf4;
      --bg3: #dde1f0;
      --bg4: #d0d5ea;
      --surface: #ffffff;
      --sur2: #f4f5fc;
      --border: #c6cce0;
      --bor2: #adb5d2;
      --text: #0f1420;
      --text2: #374166;
      --text3: #6b748f;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
      --violet: #7c3aed;
      --vsof: rgba(124, 58, 237, .10);
      --gsof: rgba(22, 163, 74, .10);
      --c0: #16a34a;
      --c1: #2563eb;
      --c2: #d97706;
      --c3: #db2777;
      --c4: #7c3aed;
      --c5: #0891b2;
      --c6: #ea580c;
      --c7: #65a30d;
      --c8: #c026d3;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background var(--tr), color var(--tr);
      font-size: 14.5px;
      line-height: 1.65;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────────────────────── */
    .hdr {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      transition: background var(--tr), border-color var(--tr);
    }

    .hdr-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 13px 0;
    }

    .hdr-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      min-width: 0
    }

    .sidebar-toggle {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background var(--tr), border-color var(--tr);
    }

    .sidebar-toggle:hover {
      background: var(--bg4)
    }

    .sidebar-toggle span {
      display: block;
      width: 14px;
      height: 1.5px;
      background: var(--text2);
      border-radius: 2px;
      transition: background var(--tr);
    }

    .hdr-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--text);
      letter-spacing: -.02em;
      white-space: nowrap;
      transition: color var(--tr);
    }

    .hdr-sub {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      color: var(--text3);
      letter-spacing: .06em;
      display: block;
      margin-top: 1px;
    }

    .hdr-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0
    }

    /* progress strip */
    .hdr-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border-right: 1px solid var(--border);
    }

    .prog-label {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      color: var(--text3);
      letter-spacing: .05em;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .autosave-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      opacity: 0;
      transition: opacity .3s
    }

    .autosave-dot.pulsing {
      opacity: 1;
      animation: pulse 1s infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .25
      }
    }

    .save-pill {
      font-family: 'DM Mono', monospace;
      font-size: .62rem;
      letter-spacing: .04em;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--gsof);
      color: var(--green);
      opacity: 0;
      transition: opacity .4s;
      white-space: nowrap;
    }

    .save-pill.show {
      opacity: 1
    }

    .hdr-prog-bar-track {
      width: 120px;
      height: 4px;
      background: var(--bg4);
      border-radius: 99px;
      overflow: hidden
    }

    .hdr-prog-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--c1), var(--green));
      border-radius: 99px;
      transition: width .5s ease;
      width: 0
    }

    .prog-count {
      font-family: 'Syne', sans-serif;
      font-size: .78rem;
      color: var(--text2);
      white-space: nowrap
    }

    /* score widget */
    .score-widget {
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 1px solid var(--border);
      padding-left: 16px
    }

    .ring-wrap {
      position: relative;
      width: 46px;
      height: 46px;
      flex-shrink: 0
    }

    .ring-wrap svg {
      transform: rotate(-90deg)
    }

    .ring-bg {
      fill: none;
      stroke: var(--bor2);
      stroke-width: 4;
      transition: stroke var(--tr)
    }

    .ring-fg {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 119;
      stroke-dashoffset: 119;
      transition: stroke-dashoffset .6s ease, stroke .4s ease
    }

    .ring-pct {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .75rem;
      color: var(--text)
    }

    .score-info {
      display: flex;
      flex-direction: column;
      gap: 1px
    }

    .verdict {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .82rem;
      transition: color .3s
    }

    .verdict.pop {
      animation: vpop .35s cubic-bezier(.175, .885, .32, 1.275)
    }

    @keyframes vpop {
      0% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.2)
      }

      100% {
        transform: scale(1)
      }
    }

    .verdict-sub {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      color: var(--text3);
      letter-spacing: .04em
    }

    /* theme toggle */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      user-select: none
    }

    .tgl-pill {
      width: 40px;
      height: 22px;
      background: var(--bg4);
      border-radius: 11px;
      border: 1px solid var(--bor2);
      position: relative;
      cursor: pointer;
      transition: background var(--tr), border-color var(--tr);
    }

    .tgl-pill::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--text3);
      top: 2px;
      left: 2px;
      transition: transform .25s ease, background .25s ease;
    }

    [data-theme="light"] .tgl-pill::after {
      transform: translateX(18px);
      background: var(--c4)
    }

    .tgl-icon {
      font-size: .85rem
    }

    /* ── LAYOUT ─────────────────────────────────────────────────── */
    .app-body {
      display: flex;
      flex: 1;
      min-height: 0;
      position: relative;
    }

    /* ── SIDEBAR ─────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 57px;
      /* header height */
      height: calc(100vh - 57px);
      overflow-y: auto;
      overflow-x: hidden;
      transition: width var(--tr), background var(--tr), border-color var(--tr);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .sidebar.collapsed {
      width: 56px
    }

    .sidebar::-webkit-scrollbar {
      width: 4px
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px
    }

    .sidebar-label {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      color: var(--text3);
      letter-spacing: .1em;
      padding: 16px 16px 6px;
      white-space: nowrap;
      transition: opacity var(--tr), padding var(--tr);
    }

    .sidebar.collapsed .sidebar-label {
      opacity: 0;
      padding: 16px 0 6px
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .2s, border-color .2s, padding var(--tr);
      position: relative;
      white-space: nowrap;
      overflow: hidden;
    }

    .sidebar.collapsed .nav-item {
      padding: 11px 0;
      justify-content: center
    }

    .nav-item:hover {
      background: var(--bg3)
    }

    .nav-item.active {
      border-left-color: var(--sc, var(--c1));
      background: var(--bg4)
    }

    .sidebar.collapsed .nav-item.active {
      border-left-color: transparent;
      border-left: 3px solid var(--sc, var(--c1))
    }

    .nav-icon {
      font-size: 1rem;
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: color-mix(in srgb, var(--sc, #6b7280) 15%, transparent);
      transition: background var(--tr);
    }

    .nav-text-wrap {
      flex: 1;
      min-width: 0;
      overflow: hidden
    }

    .nav-title {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: .78rem;
      color: var(--text2);
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color .2s, opacity var(--tr), max-width var(--tr);
    }

    .sidebar.collapsed .nav-title {
      opacity: 0;
      max-width: 0
    }

    .nav-item.active .nav-title {
      color: var(--text)
    }

    .nav-counter {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      padding: 2px 6px;
      border-radius: 99px;
      background: var(--bg3);
      color: var(--text3);
      flex-shrink: 0;
      transition: background .2s, color .2s, opacity var(--tr);
    }

    .sidebar.collapsed .nav-counter {
      opacity: 0
    }

    .nav-item.complete .nav-counter {
      background: var(--gsof);
      color: var(--green)
    }

    /* sidebar section progress bar */
    .nav-prog {
      height: 2px;
      background: var(--bg4);
      margin: 0 14px 2px;
      border-radius: 99px;
      overflow: hidden;
      transition: margin var(--tr);
    }

    .sidebar.collapsed .nav-prog {
      margin: 0 8px 2px
    }

    .nav-prog-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--sc, var(--c1));
      transition: width .4s ease
    }

    /* ── MAIN ─────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      min-width: 0;
      padding: 28px 32px 120px;
      transition: padding var(--tr);
    }

    @media(max-width:1024px) {
      .main {
        padding: 20px 20px 120px
      }
    }

    .section-panel {
      display: none
    }

    .section-panel.active {
      display: block
    }

    .sec-hdr {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    .sec-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      background: color-mix(in srgb, var(--sc) 14%, transparent);
    }

    .sec-title-wrap {
      flex: 1
    }

    .sec-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--sc);
      letter-spacing: -.01em;
    }

    .sec-meta {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      color: var(--text3);
      letter-spacing: .04em;
      margin-top: 3px
    }

    .sec-badge {
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      padding: 5px 12px;
      border-radius: 99px;
      flex-shrink: 0;
      margin-top: 2px;
      border: 1px solid color-mix(in srgb, var(--sc) 30%, transparent);
      background: color-mix(in srgb, var(--sc) 10%, transparent);
      color: var(--sc);
    }

    /* ── QUESTION CARD ───────────────────────────────────────────── */
    .q-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: background var(--tr), border-color var(--tr), box-shadow .2s;
    }

    .q-card:hover {
      box-shadow: 0 4px 20px rgba(0, 0, 0, .18)
    }

    .q-card.asked {
      border-color: var(--green)
    }

    .q-hdr {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
    }

    .q-cb-wrap {
      padding-top: 2px;
      flex-shrink: 0
    }

    .q-cb {
      width: 19px;
      height: 19px;
      border-radius: 6px;
      border: 2px solid var(--bor2);
      background: var(--bg3);
      appearance: none;
      cursor: pointer;
      position: relative;
      transition: border-color .2s, background .2s;
      flex-shrink: 0;
    }

    .q-cb:checked {
      background: var(--green);
      border-color: var(--green)
    }

    .q-cb:checked::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 5px;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .q-body {
      flex: 1;
      min-width: 0
    }

    .q-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 7px
    }

    .q-num {
      font-family: 'DM Mono', monospace;
      font-size: .62rem;
      color: var(--text3);
      letter-spacing: .06em
    }

    .q-type {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      padding: 2px 7px;
      border-radius: 99px;
      letter-spacing: .04em;
      font-weight: 500;
    }

    .q-type.open {
      background: rgba(59, 130, 246, .13);
      color: #5b9cf7
    }

    .q-type.closed {
      background: rgba(236, 72, 153, .11);
      color: #f472b6
    }

    .q-type.mixed {
      background: rgba(245, 158, 11, .11);
      color: var(--amber)
    }

    [data-theme="light"] .q-type.open {
      background: rgba(37, 99, 235, .09);
      color: #1d4ed8
    }

    [data-theme="light"] .q-type.closed {
      background: rgba(219, 39, 119, .09);
      color: #be185d
    }

    [data-theme="light"] .q-type.mixed {
      background: rgba(217, 119, 6, .09);
      color: #b45309
    }

    .q-topic {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      padding: 2px 7px;
      border-radius: 99px;
      background: var(--bg4);
      color: var(--text3);
    }

    .q-text {
      font-size: .9rem;
      color: var(--text);
      line-height: 1.6;
      transition: color var(--tr)
    }

    .q-expand {
      margin-left: auto;
      color: var(--text3);
      font-size: .7rem;
      padding-top: 2px;
      flex-shrink: 0;
      user-select: none
    }

    .q-lower {
      padding: 0 16px 16px;
      display: none
    }

    .q-lower.open {
      display: block
    }

    /* hints */
    .hints-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      margin-bottom: 10px;
      user-select: none;
    }

    .hints-label {
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      color: var(--violet);
      letter-spacing: .05em;
      font-weight: 500
    }

    .hmb-track {
      flex: 1;
      max-width: 80px;
      height: 3px;
      background: var(--bg4);
      border-radius: 99px;
      overflow: hidden
    }

    .hmb-fill {
      height: 100%;
      background: var(--violet);
      border-radius: 99px;
      transition: width .3s ease;
      width: 0
    }

    .hmc {
      font-family: 'DM Mono', monospace;
      font-size: .62rem;
      color: var(--text3)
    }

    .hchev {
      font-size: .6rem;
      color: var(--text3);
      transition: transform .2s
    }

    .hchev.open {
      transform: rotate(180deg)
    }

    .hints-panel {
      display: none;
      margin-bottom: 14px;
      background: var(--vsof);
      border-radius: 9px;
      padding: 4px 0;
      border: 1px solid rgba(139, 92, 246, .15)
    }

    .hints-panel.open {
      display: block
    }

    [data-theme="light"] .hints-panel {
      background: var(--vsof);
      border-color: rgba(124, 58, 237, .12)
    }

    .hint-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(139, 92, 246, .1);
    }

    .hint-row:last-child {
      border-bottom: none
    }

    .hint-cb {
      width: 15px;
      height: 15px;
      border-radius: 4px;
      border: 2px solid var(--bor2);
      background: var(--bg3);
      appearance: none;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      margin-top: 2px;
      transition: border-color .2s, background .2s;
    }

    .hint-cb:checked {
      background: var(--violet);
      border-color: var(--violet)
    }

    .hint-cb:checked::after {
      content: '';
      position: absolute;
      top: 0px;
      left: 3px;
      width: 4px;
      height: 8px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .hint-text {
      font-size: .81rem;
      color: var(--text2);
      line-height: 1.55;
      transition: color var(--tr)
    }

    .hint-text b {
      color: var(--text);
      font-weight: 600
    }

    /* notes */
    .notes-lbl {
      font-family: 'DM Mono', monospace;
      font-size: .62rem;
      color: var(--text3);
      letter-spacing: .06em;
      display: block;
      margin-bottom: 5px
    }

    .notes-ta {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      padding: 9px 12px;
      resize: vertical;
      min-height: 68px;
      outline: none;
      transition: border-color .2s, background var(--tr), color var(--tr);
    }

    .notes-ta:focus {
      border-color: var(--violet)
    }

    .notes-ta::placeholder {
      color: var(--text3)
    }

    /* ── BOTTOM TOOLBAR ──────────────────────────────────────────── */
    .btoolbar {
      position: fixed;
      bottom: 20px;
      right: 24px;
      z-index: 300;
      display: flex;
      gap: 8px;
    }

    .tbtn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--sur2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, transform .15s, border-color .2s;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .25);
      backdrop-filter: blur(8px);
    }

    .tbtn:hover {
      background: var(--bg4);
      transform: translateY(-2px)
    }

    .tbtn.primary {
      background: var(--violet);
      border-color: var(--violet);
      color: #fff

    /* ── MODALS ──────────────────────────────────────────────────── */

    .mbtn.primary {

      border-color: var(--violet);

    }

    .mbtn.primary:hover {
      background: #7c3aed
    }

    .mbtn.danger {
      background: rgba(239, 68, 68, .08);
      border-color: var(--red);
      color: var(--red)
    }

    .mbtn.danger:hover {
      background: var(--red);
      color: #fff
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 12px
    }

    .sess-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 13px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .2s;
    }

    .sess-item:hover {
      border-color: var(--violet)
    }

    .sess-info {
      flex: 1;
      min-width: 0
    }

    .sess-name {
      font-weight: 500;
      font-size: .83rem;
      color: var(--text);

      overflow: hidden;
      text-overflow: ellipsis

    .sess-ts {

      font-size: .6rem;
      color: var(--text3);
      margin-top: 1px
    }

    .sess-del {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: .82rem;
      padding: 3px;
      border-radius: 4px;
      transition: color .2s
    }

    .sess-del:hover {
      color: var(--red)
    }

    .modal-div {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0
    }

    .modal-lbl {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      color: var(--text3);

    .import-wrap {

    }

    /* ── SECTION COLOUR UTILITIES ────────────────────────────────── */

<body>

  <!-- BODY: sidebar + main -->
  <div class="app-body">
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-label">AREAS</div>
      <div id="navList"></div>

    <!-- MAIN -->
    <main class="main" id="mainContent"></main>

  <!-- TOOLBAR -->
  <div class="btoolbar">
    <button class="tbtn" onclick="openModal('loadMod')">📂 Load</button>
    <button class="tbtn" onclick="openModal('saveMod')">💾 Save</button>
    <button class="tbtn primary" onclick="exportTxt()">⬇ Export</button>
  </div>

  <!-- SAVE MODAL -->
  <div class="modal-bd" id="saveMod">
    <div class="modal">
      <div class="modal-title">💾 Save Session</div>
      <label class="modal-lbl">SESSION NAME</label>
      <input class="modal-input" id="saveNameInput" placeholder="e.g. Jane Smith – 12 Mar 2026" type="text">
      <div id="existWrap">
        <label class="modal-lbl">EXISTING SESSIONS</label>

      <div class="modal-actions">

  <!-- LOAD MODAL -->
  <div class="modal-bd" id="loadMod">
    <div class="modal">
      <div class="modal-title">📂 Load Session</div>

      <label class="modal-lbl">IMPORT FROM FILE</label>

        <input type="file" accept=".json" class="import-file" id="importFile" onchange="importSession(event)">
      </div>
      <div class="modal-actions">
        <button class="mbtn" onclick="closeModal('loadMod')">Close</button>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // DATA — 90 questions across 9 resilience areas
    // Questions are designed to probe CONCEPTUAL understanding AND
    // direct experiential knowledge in equal measure.
    // ═══════════════════════════════════════════════════════════════
    const SECTIONS = [
      {
        id: 'reliability-metrics', title: 'Reliability Targets & Metrics', icon: '🎯',
        questions: [
          {
            type: 'open', topic: 'RTO & RPO', text: 'What is the difference between RTO and RPO?',
            hints: [
              '<b>RTO (Recovery Time Objective)</b> is the maximum acceptable time the system can be down after a failure — it sets the deadline for recovery.',
              '<b>RPO (Recovery Point Objective)</b> is the maximum acceptable amount of data loss, measured in time — e.g. "we can lose at most 15 minutes of transactions".',
              'RPO determines how frequently you need backups or replication; RTO determines how fast your runbook steps must execute.',
              'A strong candidate can explain how these targets are derived from business requirements, not just assigned arbitrarily by engineering.',
              'Look for evidence they have actually <b>tested</b> against both targets — not just documented them.'
            ]
          },
          {
            type: 'closed', topic: 'Availability SLAs', text: 'Have you inherited an SLA with no way to measure if it was being met?',
            hints: [
              'This is very common. An SLA is a contract commitment; an <b>SLI (Service Level Indicator)</b> is the actual measurement that tells you whether you are meeting it.',
              'A meaningful availability SLI measures <b>transaction success rate</b> — not just whether the host responds to a ping.',
              'Good candidates name the tooling they used to close the gap, such as <b>Datadog Synthetics</b> or the <b>Dynatrace SLO module</b>.',
              'The real measured baseline is often worse than the stated SLA — surfacing this requires careful stakeholder management.',
              'The story should end with a remediation plan or an honest renegotiation of the SLA, not just an audit finding left open.'
            ]
          },
          {
            type: 'open', topic: 'Error Budgets', text: 'What is an error budget and how does it change release decisions?',
            hints: [
              'An error budget equals <b>1 minus the SLO target</b>. A 99.9% SLO means 0.1% of requests can fail — that 0.1% is the budget.',
              'When the budget is healthy, teams are free to release. When it is exhausted, reliability work takes priority over new features.',
              'Mature teams set up <b>burn rate alerts</b> so they know the budget is running low before it is fully gone.',
              'A good candidate mentions that error budgets protect engineers in both directions — they prevent reckless releases <i>and</i> unnecessarily long feature freezes.',
              'The SLO and its budget should be owned by the team that runs the service, not imposed by a central SRE team.'
            ]
          },
          {
            type: 'mixed', topic: 'MTTx Metrics', text: 'Your average MTTR is 47 minutes. How do you find where the time is going?',
            hints: [
              'MTTR is a composite. Break it into four phases: <b>MTTD</b> (detect), <b>MTTI</b> (investigate), <b>MTTM</b> (mitigate), <b>MTTR</b> (resolve).',
              'Use incident tooling — PagerDuty timelines or Jira Service Management — to timestamp each phase transition and identify the longest one.',
              'If detection time is high, alerts are firing too late or customers are reporting before monitors do — a monitoring gap.',
              'Investigation is usually the longest phase and the highest-value target: better traces, dashboards, and runbooks all shorten it.',
              'Any fix should be followed by a re-measurement to confirm improvement — not just assumed to have helped.'
            ]
          },
          {
            type: 'open', topic: 'SLI Design', text: 'How do you define an SLI for an async payment pipeline?',
            hints: [
              'Reject naive SLIs like CPU utilisation or process uptime — they say nothing about whether payments are actually completing.',
              'A meaningful SLI measures the <b>proportion of payments that complete successfully within the agreed time window</b>.',
              'Separate two concerns: <b>availability</b> (did the payment complete at all?) and <b>latency</b> (did it complete in time?).',
              'Decide up front how retries are counted — do you measure the first attempt, the final outcome, or track both separately?',
              'Async jobs need <b>correlation IDs</b> to link the trigger event to the eventual completion metric — without them the SLI cannot be computed.'
            ]
          },
          {
            type: 'closed', topic: 'RTO Validation', text: 'Have you run a DR drill where the system missed its RTO?',
            hints: [
              'Common causes of RTO misses: steps skipped under pressure, manual approval gates, DNS TTL too high, or a cold standby that took longer to warm up than expected.',
              'The outcome should always include a concrete fix — a runbook update, architecture change, or configuration tweak — followed by a <b>re-test to confirm the fix worked</b>.',
              'Ask whether they revised the RTO target to match reality, or fixed the system to meet the original target — both are valid but reveal very different instincts.',
              'Strong candidates run RTO tests on an automated, repeatable schedule — not as a one-off annual exercise.',
              'Stakeholders should be informed proactively when an RTO is missed in a drill, not discover it during the next compliance review.'
            ]
          },
          {
            type: 'open', topic: 'Availability Measurement', text: 'How do you make sure availability metrics reflect user experience, not just infra?',
            hints: [
              'A host responding to a health check does not mean users can complete their tasks — these are completely different signals.',
              'Use <b>synthetic transactions</b> that simulate real end-to-end user journeys, not just port checks or simple HTTP pings.',
              '<b>Real user monitoring (RUM)</b> captures failures that synthetics miss because real users interact in ways test scripts do not anticipate.',
              'Define availability as HTTP 2xx responses or business-event success rate — not reachability of a load balancer IP.',
              'Watch for "invisible degradation" — partial failures where some users are impacted but the overall error rate stays below the alert threshold.'
            ]
          },
          {
            type: 'mixed', topic: 'SLO Compliance', text: 'Your SLO shows 99.4% vs a 99.5% target with 8 days left. What do you do?',
            hints: [
              'At 99.5% monthly, the total allowed downtime is roughly 3.65 hours. Being at 99.4% means nearly all of that budget is already consumed with 8 days remaining.',
              'Any further incident this month will tip the team into an SLO breach — the risk is real and immediate, not theoretical.',
              'The immediate action is to <b>freeze high-risk deployments and migrations</b> for the remainder of the period.',
              'Escalate to engineering leadership using a clear "budget remaining" narrative — not just raw percentage figures, which are hard to reason about quickly.',
              'Plan a retrospective regardless of how the month ends — why was the budget under pressure as early as week 3?'
            ]
          },
          {
            type: 'open', topic: 'MTTx Metrics', text: 'What alerting design detects a latency regression affecting 5% of users within 2 minutes?',
            hints: [
              'A regression affecting only 5% of users will not appear in average latency — you need <b>P95 or P99 percentile-based alerting</b>.',
              'Use a short evaluation window of 1–2 minutes so the alert fires quickly after the regression begins.',
              '<b>Multi-window burn rate alerting</b> catches both fast spikes and slow degradations that build gradually over time.',
              'Every alert should carry immediate context: service name, affected endpoint, error type, and a direct link to the relevant dashboard.',
              'Anomaly detection (available in Datadog and Dynatrace) reduces false positives on metrics that have natural day-of-week or time-of-day variance.'
            ]
          },
          {
            type: 'closed', topic: 'Error Budgets', text: 'Has your team ever actually paused releases due to error budget exhaustion?',
            hints: [
              'This question reveals whether SLOs are driving real engineering decisions or just displayed on a dashboard nobody acts on.',
              'A strong answer describes a <b>clear, pre-agreed policy</b> that defined the trigger — not an ad hoc conversation when the moment arrived.',
              'Probe for specifics: who made the call, how product management was aligned in advance, and how the decision was communicated.',
              'The freeze period should be actively filled with reliability work — not a period of engineering idleness.',
              'A vague answer like "we discussed it but kept releasing" is a signal that the SLO culture is still immature.'
            ]
          },
        ]
      },
      {
        id: 'resilient-architecture', title: 'Resilient Architecture', icon: '🏗️',
        questions: [
          {
            type: 'open', topic: 'Failure Mode Analysis', text: 'How do you systematically find failure modes before a system goes live?',
            hints: [
              'The structured approach is an <b>FMEA (Failure Mode and Effect Analysis)</b> workshop run before launch, involving developers, SRE, and architects.',
              'For each component, enumerate: what can fail, what the effect on the system would be, how severe it is, how likely, and whether it would be detected.',
              'Classify failures by layer — compute, network, data, third-party dependencies — because each layer has distinct failure modes.',
              'Seed the list from existing post-mortems and incident history rather than starting from a blank page.',
              'The output should be a <b>prioritised backlog of chaos experiments to run</b>, not just a risk document that sits in a wiki.'
            ]
          },
          {
            type: 'closed', topic: 'SPOFs', text: 'Have you found a hidden SPOF in a system the team thought was highly available?',
            hints: [
              'Ask for the specific component type — common hidden SPOFs include a shared message broker, a single DNS resolver, a shared auth service, or a certificate authority.',
              'How it was discovered matters: a proactive chaos test or dependency graph analysis is more impressive than finding out during a real incident.',
              'The proof is demonstrating that failure of that one component caused the "highly available" system to fail end-to-end.',
              'Resolution should be architectural — redundancy, decoupling, or explicit risk acceptance with monitoring — not just a note in a wiki.',
              'A strong follow-up: was a SPOF check added to the architecture review process so the same mistake cannot recur?'
            ]
          },
          {
            type: 'open', topic: 'Multi-Region Design', text: 'What is the core data consistency challenge in active-active multi-region, and how do you test it?',
            hints: [
              'When both regions accept writes simultaneously, the same record can be updated in both at the same time, creating a <b>write conflict</b> that must be resolved.',
              'The choice between strong consistency (safe but slower) and eventual consistency (faster but requires conflict resolution logic) is a fundamental design decision.',
              'CAP theorem applies: under a network partition, the system must choose between remaining consistent or remaining available — not both.',
              'Test by injecting a network partition mid-write and observing whether data is lost, duplicated, or whether conflicts are resolved correctly by the application.',
              'Measure <b>replication lag under realistic load</b> and agree on the threshold at which lag becomes a business problem.'
            ]
          },
          {
            type: 'mixed', topic: 'Dependency Failure', text: 'Your service uses 5 APIs, 2 external. How do you stay up when one goes down?',
            hints: [
              'Start by classifying each dependency: is it on the <b>critical path</b> (failure = user-facing error) or non-critical (failure = degraded but functional)?',
              'Implement a <b>circuit breaker</b> per dependency so that when a dependency starts failing, the circuit opens and a tested fallback activates instead.',
              '<b>Bulkheads</b> give each dependency its own thread pool or connection pool, so one slow or failing dependency cannot exhaust resources shared by others.',
              'For third-party APIs specifically: always implement a timeout, retry with exponential backoff, and a cached fallback response for when the API is unreachable.',
              'Verify the design actually works by disabling each dependency in turn using Gremlin or LitmusChaos and checking that the correct degraded behaviour occurs.'
            ]
          },
          {
            type: 'open', topic: 'AZ Failure Handling', text: 'Describe a test you have run to verify your app survives an AZ failure.',
            hints: [
              'A concrete test: drain or terminate all instances in one AZ using chaos tooling or the cloud console, while the rest of the system runs normally.',
              'Measure the key indicators: how long the load balancer takes to reroute, how long the database failover takes, and how the cache rebalances.',
              'The most valuable outcome is discovering a gap — something that was assumed resilient but was not. Vague "everything worked fine" answers are weaker.',
              'Common unexpected findings: health check interval too long, connection pool not refreshed after failover, or sticky sessions surviving the AZ drain.',
              'The test is not complete until a configuration or architecture change is made and the test is repeated to confirm the fix.'
            ]
          },
          {
            type: 'closed', topic: 'FMEA Practice', text: 'Does your team do failure analysis before launches, or only after incidents?',
            hints: [
              'Best-practice teams run FMEA as a <b>pre-launch gate</b> — it is a structured exercise before go-live, not a reaction to something breaking.',
              'A sign of maturity: FMEA outputs live in the engineering backlog alongside feature work, not in a separate risk document nobody reads.',
              'FMEA should feed into design reviews and Architecture Decision Records (ADRs) so failure modes are part of the design conversation.',
              'Post-mortems are reactive (after the fact); FMEA is proactive (before the fact) — the candidate should understand and practice both.',
              'A good follow-up: how do they keep FMEA findings current as the system changes rapidly, without redoing the entire exercise from scratch?'
            ]
          },
          {
            type: 'open', topic: 'Cascade Prevention', text: 'What is the difference between a circuit breaker, bulkhead, and timeout?',
            hints: [
              'A <b>timeout</b> limits how long a request waits for a response. Without it, slow downstream services hold threads or connections open until the caller runs out of them.',
              'A <b>circuit breaker</b> monitors error rates and, once a threshold is crossed, stops sending requests to the failing dependency entirely — preventing cascade amplification.',
              'A <b>bulkhead</b> isolates each dependency in its own resource pool so that exhaustion caused by one failing dependency cannot starve work going to healthy ones.',
              'Test timeouts by injecting latency beyond the configured limit and verifying the caller degrades gracefully rather than hanging indefinitely.',
              'Test circuit breakers by injecting progressively higher error rates and verifying the circuit opens at exactly the configured threshold and recovers correctly in the half-open state.'
            ]
          },
          {
            type: 'mixed', topic: 'Legacy Resilience', text: 'You cannot refactor a critical legacy monolith. How do you improve its resilience?',
            hints: [
              'Add resilience externally: configure <b>load balancer health checks</b>, put a CDN in front for caching, and add an API gateway for rate limiting and circuit breaking.',
              'Identify the internal SPOFs that are hardest to avoid: a single shared database, a shared config file, or the fact that the whole app deploys as one unit.',
              'Run load and performance tests to find resource exhaustion thresholds before they become production incidents — know where the breaking point is.',
              'Instrument the boundaries deeply: external HTTP call latency, database query durations, thread pool saturation — these are the leading indicators of trouble.',
              'Use <b>blue-green deployments</b> to reduce release risk, and always test the rollback procedure before each release rather than discovering it does not work during an incident.'
            ]
          },
          {
            type: 'closed', topic: 'Dependency Mapping', text: 'Do you use tooling to keep your service dependency map current?',
            hints: [
              'Runtime dependency maps from <b>Datadog Service Map</b>, <b>Dynatrace SmartScape</b>, or AWS X-Ray automatically discover actual runtime dependencies — not just the documented ones.',
              'These tools routinely surface undocumented dependencies that were added without updating any architecture diagram.',
              'Undiscovered dependencies become untested SPOFs — they will not appear in chaos experiments or DR tests, so failures in them come as a surprise.',
              'The accuracy of the map is bounded by instrumentation coverage — services with incomplete tracing create blind spots in the dependency view.',
              'Make dependency map review a standard part of architecture review and pre-production sign-off.'
            ]
          },
          {
            type: 'open', topic: 'SPOF Prioritisation', text: 'You have found 12 SPOFs but capacity to fix only 3 this quarter. How do you choose?',
            hints: [
              'Score each SPOF on three dimensions: <b>severity of impact</b> (how many users affected, which SLOs breach), <b>probability of failure</b> (incident history, vendor reliability), and <b>detectability</b> (would monitoring catch it, or would it be a silent failure?).',
              'A high-severity, high-probability, low-detectability SPOF is the most dangerous combination — prioritise these first.',
              'SPOFs on the <b>critical path of the highest-priority user journeys</b> always outrank those on low-traffic or non-critical paths.',
              'The remaining nine SPOFs should be documented in a risk register with named owners and target dates — not forgotten until next quarter.',
              'Communicate the prioritisation and the backlog clearly to stakeholders so they understand what risk remains accepted for now.'
            ]
          },
        ]
      },
      {
        id: 'service-capacity', title: 'Service & Capacity Availability', icon: '📊',
        questions: [
          {
            type: 'open', topic: 'Capacity Modelling', text: 'How do you build a capacity model for unpredictable traffic spikes, not just seasonal peaks?',
            hints: [
              'Start with historical traffic data: establish P50, P95, and P99 baselines and study the distribution of observed spike magnitudes, not just the average.',
              'Model for a worst-case multiple of the highest traffic ever seen — not just the "expected" peak, which by definition the spike will exceed.',

    }

    function buildNav() {
      const list = document.getElementById('navList');
      SECTIONS.forEach((sec, si) => {
        const wrap = document.createElement('div');

        const item = document.createElement('div');
        item.className = `nav-item s${si}${si === 0 ? ' active' : ''}`;
        item.id = `nav-${si}`;
        item.onclick = () => switchSection(si);
        item.innerHTML = `
      <div class="nav-icon">${sec.icon}</div>
      <div class="nav-text-wrap">
        <span class="nav-title">${sec.title}</span>
      </div>
      <span class="nav-counter" id="nc-${si}">0/10</span>
    `;

        const prog = document.createElement('div');
        prog.className = 'nav-prog';
        prog.innerHTML = `<div class="nav-prog-fill s${si}" id="np-${si}" style="width:0%"></div>`;

        wrap.appendChild(item);
        wrap.appendChild(prog);
        list.appendChild(wrap);
      });
    }

    function buildSections() {
      const main = document.getElementById('mainContent');
      SECTIONS.forEach((sec, si) => {
        const panel = document.createElement('div');
        panel.className = `section-panel s${si}${si === 0 ? ' active' : ''}`;
        panel.id = `sp-${si}`;
        panel.innerHTML = `
      <div class="sec-hdr">
        <div class="sec-icon s${si}">${sec.icon}</div>
        <div class="sec-title-wrap">
          <div class="sec-title s${si}">${sec.title}</div>
          <div class="sec-meta">AREA ${si + 1} OF ${SECTIONS.length} · ${sec.questions.length} QUESTIONS</div>
        </div>
        <div class="sec-badge s${si}" id="sb-${si}">0 / ${sec.questions.length} asked</div>
      </div>
      <div id="sq-${si}"></div>
    `;
        const qc = panel.querySelector(`#sq-${si}`);
        sec.questions.forEach((q, qi) => qc.appendChild(buildCard(si, qi, q)));
        main.appendChild(panel);
      });
    }

    function buildCard(si, qi, q) {
      const id = qid(si, qi);
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = `card-${id}`;

      const tc = q.type === 'open' ? 'open' : q.type === 'closed' ? 'closed' : 'mixed';
      const tl = q.type === 'open' ? 'OPEN' : q.type === 'closed' ? 'CLOSED' : 'MIXED';

      const hintsHtml = q.hints.map((h, hi) => `
    <div class="hint-row">
      <input type="checkbox" class="hint-cb" id="hcb-${id}-${hi}" onchange="onHint('${id}',${hi},${q.hints.length})">
      <label class="hint-text" for="hcb-${id}-${hi}">${h}</label>
    </div>
  `).join('');

      card.innerHTML = `
    <div class="q-hdr" onclick="toggleCard('${id}')">
      <div class="q-cb-wrap" onclick="event.stopPropagation()">
        <input type="checkbox" class="q-cb" id="qcb-${id}" onchange="onAsked('${id}',${si})">
      </div>
      <div class="q-body">
        <div class="q-meta">
          <span class="q-num">Q${qi + 1}</span>
          <span class="q-type ${tc}">${tl}</span>
          <span class="q-topic">${q.topic}</span>
        </div>
        <div class="q-text">${q.text}</div>
      </div>
      <div class="q-expand" id="qexp-${id}">▼</div>
    </div>
    <div class="q-lower" id="ql-${id}">
      <div class="hints-row" onclick="toggleHints('${id}',${q.hints.length})">
        <span class="hints-label">💡 ANSWER HINTS</span>
        <div class="hmb-track"><div class="hmb-fill" id="hmb-${id}"></div></div>
        <span class="hmc" id="hmc-${id}">0/${q.hints.length}</span>
        <span class="hchev" id="hchev-${id}">▼</span>
      </div>
      <div class="hints-panel" id="hp-${id}">${hintsHtml}</div>
      <span class="notes-lbl">INTERVIEWER NOTES</span>
      <textarea class="notes-ta" id="nta-${id}" placeholder="Record candidate observations, quotes, and follow-ups…" oninput="onNotes('${id}')"></textarea>
    </div>
  `;
      return card;
    }

    // ═══════════════════════════════════════════════════════════════
    // INTERACTIONS
    // ═══════════════════════════════════════════════════════════════
    function switchSection(si) {
      document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(`sp-${si}`).classList.add('active');
      document.getElementById(`nav-${si}`).classList.add('active');
      state.activeSection = si;
      // on mobile, close sidebar after selection
      if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('mob-open');
    }

    function toggleCard(id) {
      const lower = document.getElementById(`ql-${id}`);
      const exp = document.getElementById(`qexp-${id}`);
      const open = lower.classList.toggle('open');
      exp.textContent = open ? '▲' : '▼';
    }

    function toggleHints(id, total) {
      const panel = document.getElementById(`hp-${id}`);
      const chev = document.getElementById(`hchev-${id}`);
      const open = panel.classList.toggle('open');
      chev.classList.toggle('open', open);
    }

    function onAsked(id, si) {
      const cb = document.getElementById(`qcb-${id}`);
      state.asked[id] = cb.checked;
      document.getElementById(`card-${id}`).classList.toggle('asked', cb.checked);
      updateAll();
      scheduleAutosave();
    }

    function onHint(id, hi, total) {
      state.hints[`${id}_${hi}`] = document.getElementById(`hcb-${id}-${hi}`).checked;
      updateHintBar(id, total);
      updateScore();
      scheduleAutosave();
    }

    function onNotes(id) {
      state.notes[id] = document.getElementById(`nta-${id}`).value;
      scheduleAutosave();
    }

    function updateHintBar(id, total) {
      let count = 0;
      for (let i = 0; i < total; i++) if (state.hints[`${id}_${i}`]) count++;
      const pct = total > 0 ? count / total * 100 : 0;
      document.getElementById(`hmb-${id}`).style.width = pct + '%';
      document.getElementById(`hmc-${id}`).textContent = `${count}/${total}`;
    }

    function updateAll() {
      let totalAsked = 0;
      const totalQ = SECTIONS.reduce((s, sec) => s + sec.questions.length, 0);

      SECTIONS.forEach((sec, si) => {
        let asked = 0;
        sec.questions.forEach((_, qi) => { if (state.asked[qid(si, qi)]) asked++; });
        totalAsked += asked;
        const pct = sec.questions.length > 0 ? asked / sec.questions.length * 100 : 0;
        const done = asked === sec.questions.length;
        const nc = document.getElementById(`nc-${si}`);
        const np = document.getElementById(`np-${si}`);
        const sb = document.getElementById(`sb-${si}`);
        const ni = document.getElementById(`nav-${si}`);
        if (nc) nc.textContent = done ? '✓' : `${asked}/${sec.questions.length}`;
        if (np) np.style.width = pct + '%';
        if (sb) sb.textContent = `${asked} / ${sec.questions.length} asked`;
        if (ni) ni.classList.toggle('complete', done);
      });

      document.getElementById('gCount').textContent = `${totalAsked} / ${totalQ}`;
      document.getElementById('gBar').style.width = (totalAsked / totalQ * 100) + '%';
      updateScore();
    }

    function updateScore() {
      let total = 0, covered = 0;
      SECTIONS.forEach((sec, si) => {
        sec.questions.forEach((q, qi) => {
          const id = qid(si, qi);
          total += q.hints.length;
          q.hints.forEach((_, hi) => { if (state.hints[`${id}_${hi}`]) covered++; });
        });
      });
      const pct = total > 0 ? Math.round(covered / total * 100) : 0;
      const circ = 2 * Math.PI * 19; // r=19
      const offset = circ - (pct / 100) * circ;

      document.getElementById('ringPct').textContent = pct + '%';
      document.getElementById('verdictSub').textContent = `${covered} / ${total} hints`;

      const ring = document.getElementById('ringFg');
      const verd = document.getElementById('verdict');
      let colour, text;
      if (pct < 40) { colour = '#ef4444'; text = 'No Hire'; }
      else if (pct < 70) { colour = '#f59e0b'; text = 'Can Consider'; }
      else { colour = '#22c55e'; text = 'Sure Hire ✓'; }

      ring.style.stroke = colour;
      ring.style.strokeDashoffset = offset;
      verd.style.color = colour;
      if (text !== lastVerdict) {
        verd.classList.remove('pop');
        void verd.offsetWidth;
        verd.classList.add('pop');
        lastVerdict = text;
      }
      verd.textContent = text;
    }

    // ═══════════════════════════════════════════════════════════════
    // SIDEBAR
    // ═══════════════════════════════════════════════════════════════
    function toggleSidebar() {
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.toggle('mob-open');
      } else {
        sidebarCollapsed = !sidebarCollapsed;
        document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // THEME
    // ═══════════════════════════════════════════════════════════════
    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
    function initTheme() {
      const saved = localStorage.getItem('theme');
      const pref = window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', saved || pref);
    }

    // ═══════════════════════════════════════════════════════════════
    // AUTOSAVE
    // ═══════════════════════════════════════════════════════════════
    function scheduleAutosave() {
      const dot = document.getElementById('autosaveDot');
      dot.classList.add('pulsing');
      clearTimeout(autosaveTimer);
      autosaveTimer = setTimeout(() => {
        doAutosave();
        dot.classList.remove('pulsing');
      }, 1500);
    }
    function doAutosave() {
      localStorage.setItem('resilience_autosave', JSON.stringify({ state, ts: new Date().toISOString() }));
      const pill = document.getElementById('savePill');
      pill.textContent = 'Auto-saved';
      pill.classList.add('show');
      setTimeout(() => pill.classList.remove('show'), 2500);
    }
    function loadAutosave() {
      const raw = localStorage.getItem('resilience_autosave');
      if (raw) { try { applyState(JSON.parse(raw).state); } catch (e) { } }
    }

    // ═══════════════════════════════════════════════════════════════
    // STATE APPLY
    // ═══════════════════════════════════════════════════════════════
    function applyState(s) {
      state.asked = s.asked || {};
      state.hints = s.hints || {};
      state.notes = s.notes || {};
      SECTIONS.forEach((sec, si) => {
        sec.questions.forEach((q, qi) => {
          const id = qid(si, qi);
          const cb = document.getElementById(`qcb-${id}`);
          if (cb) { cb.checked = !!state.asked[id]; document.getElementById(`card-${id}`).classList.toggle('asked', !!state.asked[id]); }
          q.hints.forEach((_, hi) => { const hEl = document.getElementById(`hcb-${id}-${hi}`); if (hEl) hEl.checked = !!state.hints[`${id}_${hi}`]; });
          updateHintBar(id, q.hints.length);
          const ta = document.getElementById(`nta-${id}`);
          if (ta) ta.value = state.notes[id] || '';
        });
      });
      updateAll();
    }

    // ═══════════════════════════════════════════════════════════════
    // SESSIONS
    // ═══════════════════════════════════════════════════════════════
    function getSessions() { try { return JSON.parse(localStorage.getItem('resilience_sessions') || '[]'); } catch (e) { return []; } }
    function setSessions(s) { localStorage.setItem('resilience_sessions', JSON.stringify(s)); }

    function openModal(id) {
      if (id === 'saveMod') populateSaveModal();
      if (id === 'loadMod') populateLoadModal();
      document.getElementById(id).classList.add('open');
    }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    document.querySelectorAll('.modal-bd').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); }));

    function populateSaveModal() {
      const sessions = getSessions(), list = document.getElementById('saveList');
      list.innerHTML = '';
      const wrap = document.getElementById('existWrap');
      if (!sessions.length) { wrap.style.display = 'none'; return; }
      wrap.style.display = '';
      sessions.forEach((s, i) => {
        const el = document.createElement('div');
        el.className = 'sess-item';
        el.innerHTML = `<div class="sess-info" onclick="document.getElementById('saveNameInput').value='${s.name.replace(/'/g, "\\'")}'"><div class="sess-name">${s.name}</div><div class="sess-ts">${new Date(s.ts).toLocaleString()}</div></div><button class="sess-del" onclick="delSession(${i})">✕</button>`;
        list.appendChild(el);
      });
    }

    function saveSession() {
      const name = document.getElementById('saveNameInput').value.trim();
      if (!name) { alert('Please enter a session name.'); return; }
      const sessions = getSessions();
      const idx = sessions.findIndex(s => s.name === name);
      const entry = { name, state: JSON.parse(JSON.stringify(state)), ts: new Date().toISOString() };
      if (idx >= 0) sessions[idx] = entry; else sessions.push(entry);
      setSessions(sessions);
      const pill = document.getElementById('savePill');
      pill.textContent = `Saved: ${name}`; pill.classList.add('show');
      setTimeout(() => pill.classList.remove('show'), 3000);
      closeModal('saveMod');
    }

    function delSession(i) {
      const s = getSessions(); s.splice(i, 1); setSessions(s); populateSaveModal();
    }

    function populateLoadModal() {
      const sessions = getSessions(), list = document.getElementById('loadList');
      list.innerHTML = '';
      const as = localStorage.getItem('resilience_autosave');
      if (as) { const d = JSON.parse(as); list.appendChild(mkLoadItem('⚡ Auto-save', d.ts, () => { applyState(d.state); closeModal('loadMod'); })); }
      if (!sessions.length && !as) { list.innerHTML = '<div style="color:var(--text3);font-size:.82rem;padding:8px 0">No saved sessions found.</div>'; return; }
      sessions.forEach(s => list.appendChild(mkLoadItem(s.name, s.ts, () => { applyState(s.state); closeModal('loadMod'); })));
    }

    function mkLoadItem(name, ts, fn) {
      const el = document.createElement('div'); el.className = 'sess-item';
      el.innerHTML = `<div class="sess-info"><div class="sess-name">${name}</div><div class="sess-ts">${new Date(ts).toLocaleString()}</div></div><span style="color:var(--text3);font-size:.73rem">Load →</span>`;
      el.onclick = fn; return el;
    }

    function importSession(e) {
      const file = e.target.files[0]; if (!file) return;
      const r = new FileReader();
      r.onload = ev => { try { const d = JSON.parse(ev.target.result); if (d.state) { applyState(d.state); closeModal('loadMod'); } else alert('Invalid session file.'); } catch (err) { alert('Could not parse JSON.'); } };
      r.readAsText(file); e.target.value = '';
    }

    // ═══════════════════════════════════════════════════════════════
    // EXPORT
    // ═══════════════════════════════════════════════════════════════
    function exportTxt() {
      let total = 0, covered = 0;
      SECTIONS.forEach((sec, si) => sec.questions.forEach((q, qi) => { const id = qid(si, qi); total += q.hints.length; q.hints.forEach((_, hi) => { if (state.hints[`${id}_${hi}`]) covered++; }); }));
      const pct = total > 0 ? Math.round(covered / total * 100) : 0;
      const verdict = pct < 40 ? 'No Hire' : pct < 70 ? 'Can Consider' : 'Sure Hire ✓';

      const lines = ['═'.repeat(65), '  RESILIENCE TEST ENGINEER — INTERVIEW EXPORT', '═'.repeat(65),
      `  Exported : ${new Date().toLocaleString()}`,
      `  Score    : ${pct}% (${covered}/${total} hints covered)`,
      `  Verdict  : ${verdict}`, '═'.repeat(65)];

      SECTIONS.forEach((sec, si) => {
        lines.push(`\n▌ AREA ${si + 1}: ${sec.title.toUpperCase()}`, '─'.repeat(60));
        sec.questions.forEach((q, qi) => {
          const id = qid(si, qi);
          lines.push(`\n  ${state.asked[id] ? '[ASKED]' : '[SKIP ]'} Q${qi + 1}. [${q.type.toUpperCase()}] ${q.text}`, `         Topic: ${q.topic}`, '         Hints:');
          q.hints.forEach((h, hi) => lines.push(`           ${state.hints[`${id}_${hi}`] ? '✓' : '○'} ${h.replace(/<[^>]+>/g, '')}`));
          const n = state.notes[id]; if (n && n.trim()) { lines.push('         Notes:'); n.split('\n').forEach(l => lines.push(`           ${l}`)); }
        });
      });
      lines.push('\n' + '═'.repeat(65), `  FINAL SCORE: ${pct}% — ${verdict}`, '═'.repeat(65));

      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([lines.join('\n')], { type: 'text/plain' }));
      a.download = `resilience-interview-${new Date().toISOString().slice(0, 10)}.txt`;
      a.click();
    }

    // ═══════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════
    window.addEventListener('DOMContentLoaded', () => {
      initTheme();
      buildUI();
      loadAutosave();
      switchSection(0);

      // Keep sidebar top aligned with header height
      const hdr = document.getElementById('appHdr');
      const sidebar = document.getElementById('sidebar');
      const ro = new ResizeObserver(() => {
        const h = hdr.offsetHeight;
        sidebar.style.top = h + 'px';
        sidebar.style.height = `calc(100vh - ${h}px)`;
      });
      ro.observe(hdr);
    });
  </script>
</body>

</html>
