<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Art Attack</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: #000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .spinner-wheel {
            /* simple contrast button style instead of spinning wheel */
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.8);
            color: #000;
            border-radius: 0.5rem;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
            font-size: 18px;
            font-weight: 500;
        }
        

        .spinner-wheel:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.02);
        }
        

        

        

        

        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        

        

        .hidden {
            display: none;
        }

        /* custom utility classes replacing Tailwind */
        body {
            background-color: rgba(255,255,255,0.05);
        }
        /* background stays light */
        body {
            background-color: #fafafa;
        }

        .page, .game-page {
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            padding:2rem;
            gap:2rem;
            position:relative;
        }

        
        

        .main-title {
            font-size:4rem;
            font-weight:700;
            text-align:center;
            color:#000;
        }
        
        @media(min-width:768px){ .main-title { font-size:4.5rem; } }

        .sub-title {
            font-size:1.25rem;
            text-align:center;
            max-width:40rem;
            font-weight:300;
            color:#000;
        }
        
        @media(min-width:768px){ .sub-title { font-size:1.5rem; } }

        .examples-grid {
            display:grid;
            grid-template-columns:1fr;
            gap:1.5rem;
            width:100%;
            max-width:80rem;
        }
        @media(min-width:768px){ .examples-grid { grid-template-columns:repeat(2,1fr); } }
        @media(min-width:1024px){ .examples-grid { grid-template-columns:repeat(3,1fr); } }

        .card {
            background:rgba(255,255,255,0.05);
            border-radius:1.5rem;
            padding:1.25rem;
            /* shadow removed */
            backdrop-filter:blur(4px);
            border:1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }
        .card:hover { transform:translateY(-4px); }

        .image-placeholder {
            width:100%;
            height:100%;
            background:linear-gradient(to bottom right, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
            border-radius:1rem;
            margin-bottom:1rem;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#000;
            font-size:.875rem;
            font-weight:300;
        }

        .theme-name { color:#000; font-weight:500; font-size:.875rem; }
        .style-name { color:#000; font-size:.75rem; opacity:.7; margin-top:.25rem; font-weight:300; }

        .btn {
            background:#fff;
            color:#000;
            font-weight:600;
            padding:.75rem 3rem;
            border-radius:9999px;
            font-size:1.125rem;
            border:none;
            cursor:pointer;
        }
        

        /* Game-specific */
        .spinner-container { text-align:center; width:100%; max-width:40rem; }
        .section-title { font-size:1.25rem; margin-bottom:1.5rem; color:#000; font-weight:300; }
        

        .info-card { margin-top:1rem; padding:1.5rem; background:rgba(255,255,255,0.05); border-radius:1.5rem; text-align:center; max-width:36rem; backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,0.1); }
        .info-card.bigger { padding:2.5rem; }

        .info-text { font-size:1.125rem; color:#000; font-weight:300; }
        

        .match-details { display:flex; flex-direction:column; gap:.75rem; }
        .match-theme, .match-style { font-size:1.25rem; color:#000; font-weight:500; }
        
        .multiplication { font-size:1.5rem; color:#000; opacity:.6; }
        

        .remaining-styles { margin-top:1.5rem; width:100%; max-width:40rem; }
        .styles-grid { display:grid; grid-template-columns:1fr; gap:1rem; }
        @media(min-width:768px){ .styles-grid { grid-template-columns:repeat(2,1fr); } }
        .style-card { background:rgba(255,255,255,0.05); border-radius:1rem; padding:.75rem; text-align:center; color:#000; font-size:1rem; font-weight:300; backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,0.1); transition: background 0.3s; }
        .style-card:hover { background:rgba(255,255,255,0.1); }

        .actions { margin-top:1.5rem; display:flex; flex-direction:column; gap:1rem; width:100%; max-width:20rem; }

        /* completion and history styles */
        .completion-container { margin-top:1.5rem; text-align:center; }
        .completion-title { font-size:2.5rem; color:#000; font-weight:300; }
        
        .completion-text { font-size:1.25rem; color:#000; margin-top:1rem; }
        

        .history-section { margin-top:1.5rem; width:100%; max-width:40rem; }
        .history-title { font-size:1.75rem; text-align:center; color:#000; font-weight:300; margin-bottom:1rem; }
        
        .history-list { display:flex; flex-direction:column; gap:0.75rem; }
        .history-item { background:rgba(255,255,255,0.05); padding:0.75rem 1rem; border-radius:1rem; display:flex; align-items:center; color:#000; font-size:1rem; backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,0.1); }
        .history-item:hover { background:rgba(255,255,255,0.1); }
        .history-index { font-weight:500; color:#fbbf24; margin-right:0.5rem; }
        .history-theme, .history-style { flex:1; font-weight:300; }
        .history-mult { margin:0 0.5rem; opacity:0.6; }
        


        
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Game State
        const gameState = {
            gameStarted: false,
            currentTheme: null,
            currentStyle: null,
            availableStyles: [],
            gameStage: 'theme', // 'theme', 'style', 'complete'
            isSpinning: false,
            history: [],
            themes: [
                'Creation of the World', 'The Fall of Man', 'Noah and the Ark', 'Tower of Babel',
                'Abraham & Isaac', 'Jacob Wrestling the Angel', 'Joseph\'s Coat of Many Colors',
                'Burning Bush', 'Red Sea Crossing', 'Ten Commandments', 'Walls of Jericho',
                'Gideon and the 300', 'Samson at the Temple', 'David and Goliath',
                'Elijah on Mount Carmel', 'Daniel in the Lions\' Den', 'Jonah and the Great Fish',
                'Birth of Jesus', 'Jesus Calms the Storm', 'Feeding the 5,000', 'Transfiguration',
                'Last Supper', 'Crucifixion', 'Resurrection', 'Pentecost'
            ],
            styles: [
                'Hyper-realistic photography', 'IMAX epic scene', 'Pixar-style 3D animation',
                'Comic book superhero style', 'Disney classic animation', 'Minecraft-style block art',
                'LEGO-style characters'
            ]
        };

        // Utility Functions
        function getRandomItem(array) {
            return array[Math.floor(Math.random() * array.length)];
        }





        // Event Handlers
        function startGame() {
            gameState.gameStarted = true;
            gameState.availableStyles = [...gameState.styles];
            gameState.gameStage = 'theme';
            gameState.currentTheme = null;
            gameState.currentStyle = null;
            gameState.history = [];
            render();
        }

        function spinTheme() {
            if (gameState.isSpinning) return;
            gameState.isSpinning = true;
            render();
            
            // simple delay to simulate selection
            setTimeout(() => {
                gameState.currentTheme = getRandomItem(gameState.themes);
                gameState.gameStage = 'style';
                gameState.isSpinning = false;
                render();
            }, 2000);
        }

        function spinStyle() {
            if (gameState.isSpinning || gameState.availableStyles.length === 0) return;
            gameState.isSpinning = true;
            render();
            
            // simple delay to simulate selection
            setTimeout(() => {
                gameState.currentStyle = getRandomItem(gameState.availableStyles);
                gameState.isSpinning = false;
                render();
            }, 2000);
        }

        function markStyleCompleted() {
            if (!gameState.currentStyle) return;
            
            // Add to history
            gameState.history.push({
                theme: gameState.currentTheme,
                style: gameState.currentStyle
            });
            
            gameState.availableStyles = gameState.availableStyles.filter(
                style => style !== gameState.currentStyle
            );
            gameState.currentStyle = null;
            gameState.currentTheme = null;
            gameState.gameStage = 'theme';

            if (gameState.availableStyles.length === 0) {
                gameState.gameStage = 'complete';
            }
            render();
        }

        function resetGame() {
            gameState.gameStarted = false;
            gameState.currentTheme = null;
            gameState.currentStyle = null;
            gameState.availableStyles = [...gameState.styles];
            gameState.gameStage = 'theme';
            gameState.isSpinning = false;
            gameState.history = [];
            render();
        }

        // Render Functions
        function renderLandingPage() {
            // single sample image instead of examples
            return `
                <div class="page">
                    <h1 class="main-title">🔥 Bible Art Attack!! 🎨</h1>
                    <p class="sub-title">"Create an epic masterpiece!"</p>
                    <img src="sample.jpeg" alt="Example art" class="image-placeholder" style="width:60%;" />
                    <button onclick="startGame()" class="btn">Start Game</button>
                </div>
            `;
        }

        function renderGame() {
            return `
                <div class="page">
                    <h1 class="main-title">🔥 Bible Art Attack!! 🎨</h1>
                    
                    ${!gameState.currentStyle ? `
                        <div class="spinner-container">
                            <h2 class="section-title">${gameState.gameStage === 'theme' ? 'Select a Bible Theme' : 'Select an Art Style'}</h2>
                            <button 
                                onclick="${gameState.gameStage === 'theme' ? 'spinTheme()' : 'spinStyle()'}"
                                class="spinner-wheel fade-in"
                                style="opacity: ${gameState.gameStage === 'style' && gameState.availableStyles.length === 0 ? '0.5' : '1'};"
                                ${gameState.isSpinning ? 'disabled' : ''}
                            >
                                ${gameState.isSpinning ? 'selecting...' : `${gameState.gameStage === 'theme' ? (gameState.currentTheme || 'Tap to Select') : (gameState.currentStyle || 'Tap to Select')}`}
                            </button>
                        </div>
                    ` : ''}

                    ${gameState.currentTheme && !gameState.currentStyle ? `
                        <div class="info-card">
                            <p class="info-text">📖 ${gameState.currentTheme}</p>
                        </div>
                    ` : ''}

                    ${gameState.currentStyle ? `
                        <div class="info-card bigger">
                            <h3 class="section-title">Perfect Match ✨</h3>
                            <div class="match-details">
                                <p class="match-theme">${gameState.currentTheme}</p>
                                <p class="multiplication">×</p>
                                <p class="match-style">${gameState.currentStyle}</p>
                            </div>
                        </div>
                    ` : ''}

                    ${gameState.gameStage === 'style' && gameState.currentStyle ? `
                        <div class="remaining-styles">
                            <h3 class="section-title">Remaining Styles: ${gameState.availableStyles.length}</h3>
                            <div class="styles-grid">
                                ${gameState.availableStyles.map((style) => `
                                    <div class="style-card">
                                        ${style}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${gameState.currentStyle ? `
                        <div class="actions">
                            <button
                                onclick="markStyleCompleted()"
                                class="btn"
                            >
                                Mark Style Completed
                            </button>
                            <button
                                onclick="resetGame()"
                                class="btn"
                            >
                                Reset Game
                            </button>
                        </div>
                    ` : ''}

                    ${gameState.gameStage === 'complete' ? `
                        <div class="completion-container fade-in">
                            <h2 class="completion-title">🎉 All Styles Completed! 🎉</h2>
                            <p class="completion-text">Amazing performance! Great job!</p>
                        </div>
                    ` : ''}

                    ${gameState.history.length > 0 ? `
                        <div class="history-section">
                            <h3 class="history-title">📋 History</h3>
                            <div class="history-list">
                                ${gameState.history.map((combo, index) => `
                                    <div class="history-item fade-in">
                                        <span class="history-index">${index + 1}.</span>
                                        <span class="history-theme">${combo.theme}</span>
                                        <span class="history-mult">×</span>
                                        <span class="history-style">${combo.style}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function render() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = gameState.gameStarted ? renderGame() : renderLandingPage();
        }

        // Initial render
        render();
    </script>
</body>
</html>
